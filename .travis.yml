sudo: required
services:
  - docker

before_install:
  - docker build -t mark920435/docker-react -f Dockerfile.dev . --build-arg http_proxy="http://proxy-us.intel.com:911" --build-arg https_proxy="http://proxy-us.intel.com:911"

script:
  - docker run -e CI=true mark920435/docker-react npm run test

language: generic
